<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملتقى ريزيدنس — الراشد العقارية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --gold:    #c8a45a;
  --gold2:   #e8c97a;
  --gold3:   #f0d898;
  --dark:    #0a0f18;
  --dark2:   #0c1420;
  --dark3:   #0d1a2e;
  --blue:    #0d2040;
}

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:var(--dark);
  font-family:'Tajawal', sans-serif;
  direction:rtl;
}

/* ══ NOISE GRAIN OVERLAY ══ */
body::after {
  content:'';
  position:fixed; inset:0; z-index:9990;
  pointer-events:none;
  opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px 180px;
  animation: grain 0.4s steps(1) infinite;
}
@keyframes grain {
  0%,100%{background-position:0 0}
  10%{background-position:-5% -10%}
  20%{background-position:-15% 5%}
  30%{background-position:7% -25%}
  40%{background-position:-5% 25%}
  50%{background-position:-15% 10%}
  60%{background-position:15% 0%}
  70%{background-position:0 15%}
  80%{background-position:3% 35%}
  90%{background-position:-10% 10%}
}

/* ══ CURSOR ══ */
#cur  { position:fixed; width:8px; height:8px; background:#fff; border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); mix-blend-mode:difference; transition:width .2s,height .2s; }
#cur2 { position:fixed; width:36px; height:36px; border:1px solid rgba(200,164,90,.4); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:all .12s ease; }
.cur-spark {
  position:fixed; pointer-events:none; z-index:9997;
  width:4px; height:4px; border-radius:50%;
  background:var(--gold2);
  transform:translate(-50%,-50%);
  animation: spark-fade .6s ease-out forwards;
}
@keyframes spark-fade {
  0%   { opacity:1; transform:translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0); }
}

/* ══ LOADER ══ */
#loader {
  position:fixed; inset:0; background:var(--dark);
  z-index:8000; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px;
  transition:opacity 1.2s ease;
}
#loader.out { opacity:0; pointer-events:none; }
.ld-logo    { height:90px; object-fit:contain; opacity:0; animation:fUp .8s .3s forwards; }
.ld-bar     { width:220px; height:1px; background:rgba(255,255,255,.08); overflow:hidden; opacity:0; animation:fUp .8s .6s forwards; }
.ld-fill    { height:100%; background:linear-gradient(to left,var(--gold),var(--gold2)); width:0; animation:fillW 2.4s 1s ease forwards; }
.ld-pct     { font-size:.65rem; letter-spacing:4px; color:rgba(200,164,90,.6); opacity:0; animation:fUp .8s .7s forwards; }
.ld-txt     { font-size:.7rem; letter-spacing:5px; color:rgba(255,255,255,.28); opacity:0; animation:fUp .8s .9s forwards; }
.ld-lines   { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.ld-line    { position:absolute; height:1px; background:linear-gradient(to right, transparent, rgba(200,164,90,.15), transparent); animation:scanLine 3s linear infinite; }
.ld-line:nth-child(1) { top:25%; animation-delay:0s; }
.ld-line:nth-child(2) { top:50%; animation-delay:1s; }
.ld-line:nth-child(3) { top:75%; animation-delay:2s; }
@keyframes scanLine { 0%{left:-100%; width:100%} 100%{left:200%; width:100%} }
@keyframes fUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
@keyframes fillW { to{width:100%} }

/* ══ LAYOUT ══ */
#stage { position:fixed; inset:0; display:flex; flex-direction:row; }

/* ══ IMAGE SIDE ══ */
#img-side {
  order:2; flex:0 0 58%; position:relative;
  background: radial-gradient(ellipse at 40% 50%, #0f2240 0%, #070d18 100%);
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
#particle-canvas {
  position:absolute; inset:0; width:100%; height:100%;
  z-index:2; pointer-events:none;
}
#shimmer-canvas {
  position:absolute; inset:0; width:100%; height:100%;
  z-index:4; pointer-events:none;
}

/* animated corner brackets on img-side */
.img-corner {
  position:absolute; width:28px; height:28px; z-index:5; pointer-events:none;
  transition:all .6s ease;
}
.img-corner::before, .img-corner::after {
  content:''; position:absolute; background:var(--gold); opacity:.6;
}
.img-corner::before { width:100%; height:1.5px; top:0; left:0; }
.img-corner::after  { width:1.5px; height:100%; top:0; left:0; }
.ic-tr { top:16px; left:16px; }
.ic-tl { top:16px; right:16px; transform:scaleX(-1); }
.ic-br { bottom:16px; left:16px; transform:scaleY(-1); }
.ic-bl { bottom:16px; right:16px; transform:scale(-1,-1); }

.simg {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:contain; object-position:center;
  opacity:0; z-index:1;
  clip-path:inset(50% 50% 50% 50% round 4px);
  transition:opacity 0s;
}
.simg.on {
  opacity:1;
  animation:imgReveal .9s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes imgReveal {
  0%   { clip-path:inset(8% 8% 8% 8% round 6px); opacity:0; filter:blur(14px) brightness(.5) saturate(0); }
  35%  { opacity:1; filter:blur(4px) brightness(.85) saturate(.5); }
  100% { clip-path:inset(0% 0% 0% 0% round 0px); opacity:1; filter:blur(0px) brightness(1) saturate(1); }
}

/* ══ SCAN FLASH ══ */
#scan-flash {
  position:fixed; inset:0; z-index:500; pointer-events:none;
  background:linear-gradient(to bottom, transparent 0%, rgba(200,164,90,.06) 50%, transparent 100%);
  opacity:0;
}
#scan-flash.fire {
  animation: scanFlash .55s ease-out forwards;
}
@keyframes scanFlash {
  0%   { opacity:0; transform:translateY(-100%); }
  30%  { opacity:1; }
  100% { opacity:0; transform:translateY(100%); }
}

/* ══ PANEL SIDE ══ */
#panel-side {
  order:1; flex:0 0 42%;
  background:var(--dark2);
  border-left:1px solid rgba(200,164,90,.12);
  display:flex; flex-direction:column;
  position:relative; z-index:10;
  transform-style:preserve-3d;
  will-change:transform;
}
#panel-side::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right, var(--gold), transparent);
  animation: borderPulse 3s ease-in-out infinite;
}
#panel-side::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:
    linear-gradient(rgba(200,164,90,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,164,90,.025) 1px, transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(ellipse at 60% 40%, black 30%, transparent 75%);
  z-index:0;
}
@keyframes borderPulse {
  0%,100% { opacity:.7; box-shadow:none; }
  50%     { opacity:1; box-shadow:0 0 20px rgba(200,164,90,.3); }
}

/* decorative vertical line on panel */
.panel-deco-line {
  position:absolute; top:10%; bottom:10%; right:0; width:1px;
  background:linear-gradient(to bottom, transparent, rgba(200,164,90,.2), transparent);
  z-index:1; pointer-events:none;
  animation:lineBreathe 4s ease-in-out infinite;
}
@keyframes lineBreathe {
  0%,100% { opacity:.5; }
  50%     { opacity:1; }
}

/* ambient light dot */
.panel-glow {
  position:absolute; top:-60px; right:-60px;
  width:220px; height:220px; border-radius:50%;
  background:radial-gradient(circle, rgba(200,164,90,.08) 0%, transparent 70%);
  pointer-events:none; z-index:0;
  animation:glowDrift 6s ease-in-out infinite alternate;
}
@keyframes glowDrift {
  0%   { transform:translate(0,0) scale(1); opacity:.6; }
  100% { transform:translate(-20px,30px) scale(1.2); opacity:1; }
}

/* ══ PANEL HEADER ══ */
.ph {
  padding:32px 44px 0; display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; position:relative; z-index:2;
}
.ph img { height:110px; object-fit:contain; opacity:.95; display:block; }

/* Progress ring around slide number */
.ph-counter {
  position:relative; display:flex; align-items:center; justify-content:center;
  width:56px; height:56px; flex-shrink:0;
}
.ph-counter svg { position:absolute; inset:0; width:100%; height:100%; transform:rotate(-90deg); }
.ph-counter-ring { fill:none; stroke:rgba(200,164,90,.15); stroke-width:1.5; }
.ph-counter-prog { fill:none; stroke:var(--gold); stroke-width:1.5; stroke-linecap:round; transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1); }
.ph-num-inner { text-align:center; }
.ph-num-inner b { display:block; color:rgba(255,255,255,.9); font-weight:900; font-size:.95rem; line-height:1; }
.ph-num-inner span { display:block; font-size:.6rem; letter-spacing:2px; color:rgba(255,255,255,.25); margin-top:2px; }

/* ══ PANEL BODY ══ */
.pb {
  flex:1; display:flex; flex-direction:column; justify-content:center;
  padding:28px 44px 20px; overflow-y:auto; gap:0;
  position:relative; z-index:2;
}
.pb::-webkit-scrollbar { width:4px; }
.pb::-webkit-scrollbar-track { background:transparent; }
.pb::-webkit-scrollbar-thumb { background:rgba(200,164,90,.35); border-radius:4px; }
.pb::-webkit-scrollbar-thumb:hover { background:rgba(200,164,90,.7); }

/* animation trigger classes */
.pb.reset > * { opacity:0 !important; transform:translateY(-40px) !important; animation:none !important; }

/* ══ TAG ══ */
.p-tag {
  display:inline-flex; align-items:center; gap:10px;
  font-size:.82rem; letter-spacing:5px;
  color:rgba(200,164,90,.8);
  text-transform:uppercase;
  margin-bottom:18px;
  opacity:0; animation:wordSlide .9s .1s cubic-bezier(.16,1,.3,1) both;
}
.p-tag::before { content:''; width:20px; height:1px; background:var(--gold); flex-shrink:0; box-shadow:0 0 6px rgba(200,164,90,.5); }

/* ══ TITLE (word-by-word animation) ══ */
.p-ttl {
  font-size:clamp(2.1rem, 3.2vw, 3.2rem);
  font-weight:900; line-height:1.22; color:#fff;
  opacity:0; animation:wordSlide 1.1s .22s cubic-bezier(.16,1,.3,1) both;
}
.p-ttl em { font-style:normal; color:var(--gold2); position:relative; }
.p-ttl em::after {
  content:''; position:absolute; bottom:-3px; left:0; right:0; height:1px;
  background:linear-gradient(to left, var(--gold), transparent);
  animation:lineGrow 1s 1s ease forwards;
  transform-origin:right; transform:scaleX(0);
}
@keyframes lineGrow { to{transform:scaleX(1); } }

.p-ln {
  display:block; height:2px; width:0; min-height:2px;
  background:linear-gradient(to right, var(--gold), transparent);
  margin:22px 0;
  box-shadow:0 0 12px rgba(200,164,90,.5);
  opacity:0; animation:lnReveal .6s .34s ease both;
}
@keyframes lnReveal {
  from { opacity:0; width:0; }
  to   { opacity:1; width:48px; }
}

/* ══ SUBTITLE with scramble placeholder ══ */
.p-sub {
  font-size:1.12rem; font-weight:300; line-height:1.95;
  color:rgba(255,255,255,.75);
  opacity:0; animation:wordSlide 1.0s .44s cubic-bezier(.16,1,.3,1) both;
  position:relative;
}
.p-sub .scramble-char { display:inline; }

/* ══ STATS ══ */
.p-stats {
  display:flex; margin-top:28px;
  border-top:1px solid rgba(255,255,255,.05);
  padding-top:22px;
  opacity:0; animation:wordSlide 1.0s .58s cubic-bezier(.16,1,.3,1) both;
}
.st { flex:1; padding-left:18px; padding-right:14px; border-left:1px solid rgba(255,255,255,.06); position:relative; }
.st:last-child { border-left:none; }
.st-n {
  display:block; font-size:1.9rem; font-weight:900; color:#fff; line-height:1;
  text-shadow:0 0 30px rgba(200,164,90,.3);
  transition:text-shadow .3s;
}
.st-n.glow { text-shadow:0 0 20px rgba(200,164,90,.8), 0 0 40px rgba(200,164,90,.4); }
.st-l { display:block; font-size:.72rem; color:rgba(255,255,255,.35); margin-top:6px; letter-spacing:1px; }

/* stat bar accent */
.st::before {
  content:''; position:absolute; top:0; right:-1px; width:1px; height:0;
  background:linear-gradient(to bottom, var(--gold), transparent);
  animation:stBarGrow .8s .9s ease forwards;
}
@keyframes stBarGrow { to { height:100%; } }

/* ══ STAT CARDS (slide 6) ══ */
.p-stat-cards {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:22px;
  opacity:0; animation:wordSlide .7s .50s cubic-bezier(.22,1.3,.36,1) both;
}
.sc {
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  padding:14px 16px 12px;
  position:relative; overflow:hidden;
  cursor:default;
  transition:transform .3s, border-color .3s, box-shadow .3s;
}
.sc::before {
  content:''; position:absolute; top:0; right:0; left:0; height:2px;
  background:var(--sc-color, #c8a45a);
  opacity:.7;
}
.sc::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.03) 0%, transparent 60%);
  pointer-events:none;
}
.sc:hover {
  transform:translateY(-3px);
  border-color:rgba(255,255,255,.14);
  box-shadow:0 8px 28px rgba(0,0,0,.4), 0 0 0 1px var(--sc-color, #c8a45a) inset;
}
/* last card spans full width if odd count */
.sc:last-child:nth-child(odd) { grid-column:1/-1; max-width:calc(50% - 5px); margin:0 auto; }
.sc-icon { font-size:1.4rem; line-height:1; margin-bottom:8px; display:block; }
.sc-num  {
  display:block; font-size:1.6rem; font-weight:900; color:#fff; line-height:1;
  letter-spacing:-1px;
  text-shadow:0 0 20px var(--sc-color, #c8a45a);
}
.sc-unit { font-size:.75rem; font-weight:400; color:rgba(255,255,255,.45); margin-right:3px; }
.sc-label{ display:block; font-size:.72rem; color:rgba(255,255,255,.38); margin-top:6px; letter-spacing:.5px; }

/* staggered entrance per card */
.sc:nth-child(1) { opacity:0; animation:scSlide .7s .55s cubic-bezier(.22,1.4,.36,1) both; }
.sc:nth-child(2) { opacity:0; animation:scSlide .7s .72s cubic-bezier(.22,1.4,.36,1) both; }
.sc:nth-child(3) { opacity:0; animation:scSlide .7s .89s cubic-bezier(.22,1.4,.36,1) both; }
.sc:nth-child(4) { opacity:0; animation:scSlide .7s 1.06s cubic-bezier(.22,1.4,.36,1) both; }
.sc:nth-child(5) { opacity:0; animation:scSlide .7s 1.23s cubic-bezier(.22,1.4,.36,1) both; }
@keyframes scSlide {
  0%   { opacity:0; transform:translateY(24px) scale(.9); filter:blur(8px); }
  50%  { opacity:1; filter:blur(0); }
  70%  { transform:translateY(-4px) scale(1.03); }
  85%  { transform:translateY(2px) scale(.98); }
  100% { opacity:1; transform:none; }
}

/* ══ STEPS (slide 12) ══ */
.p-steps { display:flex; flex-direction:column; gap:0; margin-top:18px; }
.step-row {
  display:flex; align-items:center; gap:16px;
  opacity:0; position:relative; cursor:default;
}
.step-row:not(:last-child)::after {
  content:''; position:absolute; right:19px; top:40px;
  width:1px; height:calc(100% - 6px);
  background:linear-gradient(to bottom, rgba(200,164,90,.45), rgba(200,164,90,.04)); z-index:0;
}
.step-circle {
  width:40px; height:40px; border-radius:50%;
  border:1.5px solid rgba(200,164,90,.55);
  background:rgba(200,164,90,.07);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-size:.88rem; font-weight:900; color:var(--gold);
  position:relative; z-index:1; box-shadow:0 0 10px rgba(200,164,90,.1);
  transition:all .35s cubic-bezier(.16,1,.3,1);
}
.step-row:hover .step-circle {
  background:rgba(200,164,90,.2); border-color:var(--gold);
  box-shadow:0 0 22px rgba(200,164,90,.45), inset 0 0 10px rgba(200,164,90,.1);
  transform:scale(1.12); color:#fff;
}
.step-text { font-size:1rem; font-weight:300; color:rgba(255,255,255,.7); line-height:1.45; padding:10px 0; transition:color .3s; }
.step-row:hover .step-text { color:#fff; }
.step-row:nth-child(1) { animation:stepReveal .6s .42s cubic-bezier(.16,1,.3,1) both; }
.step-row:nth-child(2) { animation:stepReveal .6s .54s cubic-bezier(.16,1,.3,1) both; }
.step-row:nth-child(3) { animation:stepReveal .6s .66s cubic-bezier(.16,1,.3,1) both; }
.step-row:nth-child(4) { animation:stepReveal .6s .78s cubic-bezier(.16,1,.3,1) both; }
.step-row:nth-child(5) { animation:stepReveal .6s .90s cubic-bezier(.16,1,.3,1) both; }
.step-row:nth-child(6) { animation:stepReveal .6s 1.02s cubic-bezier(.16,1,.3,1) both; }
.step-row:nth-child(7) { animation:stepReveal .6s 1.14s cubic-bezier(.16,1,.3,1) both; }
.step-row:nth-child(8) { animation:stepReveal .6s 1.26s cubic-bezier(.16,1,.3,1) both; }
@keyframes stepReveal {
  0%   { opacity:0; transform:translateX(24px); filter:blur(5px); }
  45%  { filter:blur(0); }
  100% { opacity:1; transform:translateX(0); }
}

/* ══ CHIPS ══ */
.p-chips {
  display:flex; flex-wrap:wrap; gap:9px; margin-top:24px;
  opacity:1;
}
.ch {
  background:rgba(255,255,255,.03);
  border:1px solid rgba(200,164,90,.15);
  color:rgba(255,255,255,.75);
  font-size:.94rem; padding:11px 20px;
  line-height:1.4; cursor:default;
  transition:all .25s; position:relative; overflow:hidden;
  transform:translateZ(0);
}
.ch::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(200,164,90,.08) 0%, transparent 60%);
  opacity:0; transition:opacity .3s;
}
.ch:hover { background:rgba(200,164,90,.1); border-color:rgba(200,164,90,.5); color:#fff; transform:translateY(-2px); box-shadow:0 4px 20px rgba(200,164,90,.2); }
.ch:hover::before { opacity:1; }

/* chip entrance — cinematic curtain wipe */
.ch {
  opacity:0;
  clip-path:inset(0 0 0 100%);
}
.ch:nth-child(1) { animation:chipWipe .75s  .48s cubic-bezier(.16,1,.3,1) both; }
.ch:nth-child(2) { animation:chipWipe .75s  .62s cubic-bezier(.16,1,.3,1) both; }
.ch:nth-child(3) { animation:chipWipe .75s  .76s cubic-bezier(.16,1,.3,1) both; }
.ch:nth-child(4) { animation:chipWipe .75s  .90s cubic-bezier(.16,1,.3,1) both; }
.ch:nth-child(5) { animation:chipWipe .75s  1.04s cubic-bezier(.16,1,.3,1) both; }
.ch:nth-child(6) { animation:chipWipe .75s  1.18s cubic-bezier(.16,1,.3,1) both; }
.ch:nth-child(7) { animation:chipWipe .75s  1.32s cubic-bezier(.16,1,.3,1) both; }
.ch:nth-child(8) { animation:chipWipe .75s  1.46s cubic-bezier(.16,1,.3,1) both; }
@keyframes chipWipe {
  0%   { opacity:0; clip-path:inset(0 0 0 100%); filter:blur(4px); }
  20%  { opacity:1; }
  100% { opacity:1; clip-path:inset(0 0% 0 0%); filter:blur(0); }
}

/* ══ PANEL FOOTER ══ */
.pf {
  padding:16px 44px 28px; display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; border-top:1px solid rgba(255,255,255,.04); position:relative; z-index:2;
}

#dots { display:flex; gap:6px; align-items:center; }
.dot {
  width:6px; height:6px; border-radius:50%;
  background:rgba(255,255,255,.15); cursor:pointer;
  transition:all .35s cubic-bezier(.34,1.5,.64,1); pointer-events:all;
  position:relative;
}
.dot::after { content:''; position:absolute; inset:-4px; border-radius:50%; }
.dot.on { width:28px; border-radius:3px; background:var(--gold); box-shadow:0 0 10px rgba(200,164,90,.5); }
.dot:hover:not(.on) { background:rgba(200,164,90,.5); transform:scale(1.3); }

.nav-wrap { display:flex; align-items:center; gap:6px; }
.arr {
  width:48px; height:48px;
  background:rgba(200,164,90,.1);
  border:1.5px solid rgba(200,164,90,.4);
  color:var(--gold); font-size:1.5rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;

.arr-lbl { font-size:.62rem; letter-spacing:1px; color:rgba(200,164,90,.5); text-align:center; margin-top:3px; }

#auto-ring {
  position:absolute; inset:-8px; pointer-events:none;
  opacity:0; transition:opacity .4s;
}
#auto-ring.on { opacity:1; }
#auto-ring circle {
  fill:none; stroke:var(--gold); stroke-width:1; stroke-linecap:round;

#auto-ring circle.ani { animation:autoRing 6s linear forwards; }

#prog::after {
  content:''; position:absolute; right:0; top:50%;

/* ═══ PARTICLE CONSTELLATION SYSTEM ═══ */
(function(){
  const canvas  = document.getElementById('particle-canvas');
  const ctx     = canvas.getContext('2d');
  const imgSide = document.getElementById('img-side');
  let particles = [];
  const NUM = 55;
  const GOLD = [200,164,90];

  class Particle {
    constructor(){
      this.reset();
      this.y = Math.random() * canvas.height;
      this.opacity = Math.random() * .5 + .1;
    }
    reset(){
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.vx = (Math.random()-0.5) * 0.28;
      this.vy = (Math.random()-0.5) * 0.28;
      this.r  = Math.random() * 1.8 + 0.4;
      this.opacity = Math.random() * .5 + .1;
      this.pulse = Math.random() * Math.PI * 2;
    }
    update(){
      this.x  += this.vx;
      this.y  += this.vy;
      this.pulse += 0.018;
      if(this.x<-20||this.x>canvas.width+20||this.y<-20||this.y>canvas.height+20) this.reset();
    }
    draw(){
      const op = this.opacity * (0.7 + 0.3*Math.sin(this.pulse));
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${GOLD[0]},${GOLD[1]},${GOLD[2]},${op})`;
      ctx.fill();
    }
  }

  function resize(){
    canvas.width  = imgSide.offsetWidth;
    canvas.height = imgSide.offsetHeight;
  }

  function init(){
    resize();
    particles = Array.from({length:NUM}, ()=>new Particle());
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // draw connections
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < 90){
          const op = (1 - dist/90) * 0.12;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(${GOLD[0]},${GOLD[1]},${GOLD[2]},${op})`;
          ctx.lineWidth = .5;
          ctx.stroke();
        }
      }
    }

    particles.forEach(p=>{ p.update(); p.draw(); });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', ()=>{ resize(); });
  init();
  requestAnimationFrame(draw);
})();

/* ═══ SHIMMER CANVAS (bars on letterbox) ═══ */
(function(){
  const canvas  = document.getElementById('shimmer-canvas');
  const ctx     = canvas.getContext('2d');
  const imgSide = document.getElementById('img-side');
  let t = 0;

  function getLetterboxHeight(){
    const sw = imgSide.offsetWidth, sh = imgSide.offsetHeight;
    const img = imgs[cur];
    if(!img||!img.naturalWidth) return 0;
    const renderedH = Math.min(sh, sw * img.naturalHeight / img.naturalWidth);
    return Math.max(0, Math.floor((sh-renderedH)/2));
  }

  function resize(){
    canvas.width  = imgSide.offsetWidth;
    canvas.height = imgSide.offsetHeight;
  }

  function draw(){
    const W=canvas.width, H=canvas.height;
    const barH = getLetterboxHeight();
    ctx.clearRect(0,0,W,H);
    if(barH<4){ t+=0.008; requestAnimationFrame(draw); return; }
    t+=0.008;

    [{y:0,h:barH},{y:H-barH,h:barH}].forEach((bar,bi)=>{
      const bg = ctx.createLinearGradient(0,bar.y,0,bar.y+bar.h);
      bg.addColorStop(0,'rgba(200,164,90,0.04)');
      bg.addColorStop(.5,'rgba(200,164,90,0.12)');
      bg.addColorStop(1,'rgba(200,164,90,0.04)');
      ctx.fillStyle=bg; ctx.fillRect(0,bar.y,W,bar.h);

      const edge = bi===0 ? bar.y+bar.h : bar.y;
      const eg = ctx.createLinearGradient(0,edge-6,0,edge+6);
      eg.addColorStop(0,'rgba(200,164,90,0)');
      eg.addColorStop(.5,`rgba(200,164,90,${.18+.1*Math.sin(t*1.2)})`);
      eg.addColorStop(1,'rgba(200,164,90,0)');
      ctx.fillStyle=eg; ctx.fillRect(0,edge-8,W,16);

      const phase = ((t*0.5+bi*Math.PI*0.5) % 1 + 1) % 1;
      const cx2 = phase*W, sw2=W*0.35;
      const sg = ctx.createLinearGradient(cx2-sw2,0,cx2+sw2,0);
      sg.addColorStop(0,'rgba(232,201,122,0)');
      sg.addColorStop(.35,'rgba(232,201,122,0)');
      sg.addColorStop(.5,`rgba(232,201,122,${.5+.15*Math.sin(t+bi*Math.PI)})`);
      sg.addColorStop(.65,'rgba(232,201,122,0)');
      sg.addColorStop(1,'rgba(232,201,122,0)');
      ctx.fillStyle=sg; ctx.fillRect(0,bar.y,W,bar.h);

      ctx.save();
      ctx.globalAlpha=.2+.08*Math.sin(t*0.9+bi*Math.PI);
      ctx.strokeStyle='#c8a45a'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,edge); ctx.lineTo(W,edge); ctx.stroke();
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener('resize',()=>resize());
  imgs.forEach(img=>img.addEventListener('load',resize));
  requestAnimationFrame(draw);
})();

/* ═══ CURSOR SPARKLE TRAIL ═══ */
(function(){
  const c1=document.getElementById('cur'), c2=document.getElementById('cur2');
  let mx=0,my=0,rx=0,ry=0,lx=0,ly=0,sparkTimer=0;

  document.addEventListener('mousemove',e=>{
    mx=e.clientX; my=e.clientY;
    const dx=mx-lx, dy=my-ly;
    const speed=Math.sqrt(dx*dx+dy*dy);
    sparkTimer++;
    if(speed>5 && sparkTimer%2===0){
      const spark=document.createElement('div');
      spark.className='cur-spark';
      const angle=Math.random()*Math.PI*2;
      const dist=Math.random()*18+5;
      spark.style.setProperty('--dx', Math.cos(angle)*dist+'px');
      spark.style.setProperty('--dy', Math.sin(angle)*dist+'px');
      spark.style.left=mx+'px'; spark.style.top=my+'px';
      spark.style.width=(Math.random()*3+1.5)+'px';
      spark.style.height=spark.style.width;
      spark.style.background=`hsl(${40+Math.random()*20},100%,${60+Math.random()*20}%)`;
      spark.style.animationDuration=(Math.random()*.4+.3)+'s';
      document.body.appendChild(spark);
      setTimeout(()=>spark.remove(),700);
    }
    lx=mx; ly=my;
  });

  (function loop(){
    rx+=(mx-rx)*.13; ry+=(my-ry)*.13;
    c1.style.left=mx+'px'; c1.style.top=my+'px';
    c2.style.left=rx+'px'; c2.style.top=ry+'px';
    requestAnimationFrame(loop);
  })();
})();

/* ═══ PANEL 3D TILT ═══ */
(function(){
  const panel = document.getElementById('panel-side');
  let tiltX=0, tiltY=0, targetX=0, targetY=0;

  document.addEventListener('mousemove',e=>{
    const r = panel.getBoundingClientRect();
    if(e.clientX < r.left || e.clientX > r.right) { targetX=0; targetY=0; return; }
    const px = (e.clientX-r.left)/r.width - 0.5;
    const py = (e.clientY-r.top)/r.height - 0.5;
    targetY = px * 3.5;
    targetX = -py * 2.5;
  });

  document.addEventListener('mouseleave',()=>{ targetX=0; targetY=0; });

  (function loop(){
    tiltX += (targetX-tiltX)*.06;
    tiltY += (targetY-tiltY)*.06;
    panel.style.transform = `perspective(1200px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
    requestAnimationFrame(loop);
  })();
})();

/* ═══ TEXT SCRAMBLE ═══ */
class TextScramble {
  constructor(el){ this.el=el; this.chars='!<>-_\\/[]{}—=+*^?#░▒▓'; this.raf=null; }
  setText(newText){
    if(this.raf) cancelAnimationFrame(this.raf);
    const old = this.el.innerHTML;
    const plain = newText.replace(/<[^>]+>/g,'');
    const len = Math.max(plain.length, 1);
    let frame=0, totalFrames=Math.min(len*1.2, 22);
    const step=()=>{
      const progress = frame/totalFrames;
      let output='';
      const words = newText.split(' ');
      let charCount=0;
      words.forEach((word,wi)=>{
        const plainWord = word.replace(/<[^>]+>/g,'');
        const isEm = word.includes('<em>');
        let wordOut='';
        for(let ci=0;ci<plainWord.length;ci++){
          const globalIdx=charCount+ci;
          const reveal = progress > globalIdx/len;
          if(reveal){
            wordOut += plainWord[ci];
          } else if(progress > (globalIdx-3)/len && frame%2===0){
            wordOut += this.chars[Math.floor(Math.random()*this.chars.length)];
          } else {
            wordOut += ' ';
          }
        }
        if(isEm) output+=`<em>${wordOut}</em>`;
        else output+=wordOut;
        if(wi<words.length-1) output+=' ';
        charCount+=plainWord.length+1;
      });
      this.el.innerHTML = output;
      if(frame<totalFrames){ frame++; this.raf=requestAnimationFrame(step); }
      else { this.el.innerHTML=newText; }
    };
    step();
  }
}
const subScramble = new TextScramble({ innerHTML:'', set innerHTML(v){ }, get innerHTML(){ return this._v||''; }, _el:null });

/* ═══ COUNTER ANIMATION ═══ */
function animateCounter(el, targetStr, delay=0){
  const num = parseFloat(targetStr.replace(/[^\d.]/g,''));
  if(isNaN(num) || num === 0){ el.textContent = targetStr; return; }

  const suffix = targetStr.replace(/[\d.]/g,'');
  const dur = 1200, fps=60, steps=dur/1000*fps;
  let f=0;
  setTimeout(()=>{
    el.classList.add('glow');
    const tick=()=>{
      f++;
      const ease = 1-Math.pow(1-f/steps,3);
      const val = num*ease;
      let display;
      if(num>=1000) display = val.toLocaleString('ar',{maximumFractionDigits:0});
      else if(Number.isInteger(num)) display = Math.round(val).toString();
      else display = val.toFixed(2);
      el.textContent = display + suffix;
      if(f<steps) requestAnimationFrame(tick);
      else { el.textContent=targetStr; setTimeout(()=>el.classList.remove('glow'),600); }
    };
    requestAnimationFrame(tick);
  }, delay);
}

/* ═══ RENDER PANEL ═══ */
function renderPanel(d){
  let h='';
  h+=`<div class="p-tag">${d.tag}</div>`;
  h+=`<div class="p-ttl">${d.ttl}</div>`;
  h+=`<span class="p-ln"></span>`;
  h+=`<div class="p-sub">${d.sub}</div>`;
  if(d.stats){
    h+='<div class="p-stats">';
    d.stats.forEach(s=>h+=`<div class="st"><span class="st-n" data-target="${s[0]}">${s[0]}</span><span class="st-l">${s[1]}</span></div>`);
    h+='</div>';
  }
  if(d.statCards){
    h+='<div class="p-stat-cards">';
    d.statCards.forEach(sc=>{
      h+=`<div class="sc" style="--sc-color:${sc.color}">
        <span class="sc-icon">${sc.icon}</span>
        <span class="sc-num" data-target="${sc.num}" data-unit="${sc.unit}">0</span>
        <span class="sc-unit">${sc.unit}</span>
        <span class="sc-label">${sc.label}</span>
      </div>`;
    });
    h+='</div>';
  }
  if(d.steps){
    h+='<div class="p-steps">';
    d.steps.forEach((s,i)=>{
      h+=`<div class="step-row"><div class="step-circle">${i+1}</div><span class="step-text">${s}</span></div>`;
    });
    h+='</div>';
  }
  if(d.chips){
    h+='<div class="p-chips">';
    d.chips.forEach(c=>h+=`<div class="ch">${c}</div>`);
    h+='</div>';
  }
  pb.innerHTML=h;
  pb.scrollTop=0;

  // trigger stat counters
  setTimeout(()=>{
    pb.querySelectorAll('.st-n[data-target]').forEach((el,i)=>{
      animateCounter(el, el.dataset.target, 600 + i*120);
    });
    pb.querySelectorAll('.sc-num[data-target]').forEach((el,i)=>{
      const target = parseInt(el.dataset.target);
      const unit   = el.dataset.unit;
      animateStatCard(el, target, unit, 600 + i*200);
    });
  },100);

  // magnetic chips
  pb.querySelectorAll('.ch').forEach(chip=>{
    chip.addEventListener('mousemove',e=>{
      const r=chip.getBoundingClientRect();
      const dx=(e.clientX-r.left-r.width/2)/r.width*14;
      const dy=(e.clientY-r.top-r.height/2)/r.height*8;
      chip.style.transform=`translate(${dx}px,${dy}px) translateY(-2px)`;
    });
    chip.addEventListener('mouseleave',()=>{ chip.style.transform=''; });
  });
}

/* ═══ STAT CARD COUNTER ═══ */
function animateStatCard(el, target, unit, delay=0){
  const dur=1600, fps=60, steps=dur/1000*fps;
  let f=0;
  setTimeout(()=>{
    const tick=()=>{
      f++;
      const ease = 1 - Math.pow(1 - f/steps, 4);
      const val  = Math.round(target * ease);
      el.textContent = val.toLocaleString('en') + ' ';
      if(f<steps) requestAnimationFrame(tick);
      else { el.textContent = target.toLocaleString('en') + ' '; }
    };
    requestAnimationFrame(tick);
  }, delay);
}

/* ═══ RENDER HERO ═══ */
function renderHero(d,i){
  hTag.innerHTML=d.tag;
  hTtl.innerHTML=d.ttl;
  hSub.innerHTML=d.sub;
  hN.textContent=String(i+1).padStart(2,'0');
  hSts.innerHTML = d.stats
    ? d.stats.map(s=>`<div class="st"><span class="st-n" data-target="${s[0]}">${s[0]}</span><span class="st-l">${s[1]}</span></div>`).join('')
    : '';
  hSts.style.display = d.stats ? 'flex':'none';
  [hTag,hTtl,hSub,hSts,...heroOv.querySelectorAll('.p-ln')].forEach(el=>{
    el.style.animation='none'; void el.offsetWidth; el.style.animation='';
  });
  setTimeout(()=>{
    heroOv.querySelectorAll('.st-n[data-target]').forEach((el,i)=>{
      animateCounter(el, el.dataset.target, 800+i*150);
    });
  },200);
}

/* ═══ UPDATE UI ═══ */
function updateUI(i){
  const d=DATA[i];
  prog.style.width=((i+1)/TOTAL*100)+'%';
  updateProgressRing(i);
  document.querySelectorAll('.dot').forEach((dt,j)=>dt.classList.toggle('on',j===i));

  if(d.hero){
    document.body.classList.add('hero-mode');
    heroOv.classList.add('show');
    panelSide.style.display='none';
    renderHero(d,i);
  } else {
    document.body.classList.remove('hero-mode');
    heroOv.classList.remove('show');
    panelSide.style.display='flex';
    sNum.textContent=String(i+1).padStart(2,'0');
    pb.classList.add('reset');
    renderPanel(d);
    void pb.offsetWidth;
    pb.classList.remove('reset');
  }
}

/* ═══ GO ═══ */
function go(next){
  if(busy||next===cur) return;
  busy=true;

  // scan flash effect
  scanFlash.classList.remove('fire');
  void scanFlash.offsetWidth;
  scanFlash.classList.add('fire');

  curt.style.transition='opacity .18s ease';
  curt.classList.add('fl');

  setTimeout(()=>{
    imgs[cur].classList.remove('on');
    const ni=imgs[next];
    ni.style.animation='none'; void ni.offsetWidth; ni.style.animation='';
    ni.classList.add('on');
    cur=next;
    updateUI(cur);
    curt.style.transition='opacity .42s ease';
    curt.classList.remove('fl');
    setTimeout(()=>busy=false,450);
  },200);
}

const goNext=()=>go(cur<TOTAL-1?cur+1:0);
const goPrev=()=>go(cur>0?cur-1:TOTAL-1);

document.getElementById('btnNext').addEventListener('click',goNext);
document.getElementById('btnPrev').addEventListener('click',goPrev);

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') goNext();
  if(e.key==='ArrowLeft')  goPrev();
  if(e.key===' '){ e.preventDefault(); toggleAuto(); }
  if(e.key==='f'||e.key==='F') document.documentElement.requestFullscreen?.();
});

let wc=false;
document.addEventListener('wheel',e=>{
  const pbNode=document.getElementById('pb');
  if(e.target===pbNode||pbNode.contains(e.target)) return;
  if(wc) return; wc=true;
  e.deltaY>0?goNext():goPrev();
  setTimeout(()=>wc=false,800);
},{passive:true});

let tx=0,ty=0;
document.addEventListener('touchstart',e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; },{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>55){ dx>0?goPrev():goNext(); }
},{passive:true});

/* ═══ AUTO-PLAY WITH RING ═══ */
function toggleAuto(){
  autoOn=!autoOn;
  if(autoOn){
    autoT=setInterval(goNext,6000);
    aLbl.textContent='⏸ إيقاف';
    aLbl.classList.add('on');
    autoRing.classList.add('on');
    autoRingCircle.classList.remove('ani');
    void autoRingCircle.offsetWidth;
    autoRingCircle.classList.add('ani');
    autoRingT = setInterval(()=>{
      autoRingCircle.classList.remove('ani');
      void autoRingCircle.offsetWidth;
      autoRingCircle.classList.add('ani');
    },6000);
  } else {
    clearInterval(autoT);
    clearInterval(autoRingT);
    aLbl.textContent='▶ تلقائي';
    aLbl.classList.remove('on');
    autoRing.classList.remove('on');
    autoRingCircle.classList.remove('ani');
  }
}
aLbl.addEventListener('click',toggleAuto);

/* ═══ INIT ═══ */
updateUI(0);
setTimeout(()=>{
  ldPct.textContent='100%';
  document.getElementById('loader').classList.add('out');
},2600);
