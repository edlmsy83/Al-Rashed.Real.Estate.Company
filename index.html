<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملتقى ريزيدنس — الراشد العقارية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#0a0f18;
  font-family:'Tajawal', sans-serif;
  direction:rtl;
  /* تم إزالة cursor:none من هنا ونقله للأسفل للتحكم به حسب نوع الجهاز */
}

/* ══ CURSOR ══ */
#cur  { position:fixed; width:10px; height:10px; background:#fff; border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); mix-blend-mode:difference; transition:width .2s, height .2s; }
#cur2 { position:fixed; width:36px; height:36px; border:1px solid rgba(255,255,255,.3); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:all .12s ease; }

/* ══ LOADER ══ */
#loader {
  position:fixed; inset:0;
  background:#0a0f18;
  z-index:8000;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px;
  transition:opacity 1s ease;
}
#loader.out { opacity:0; pointer-events:none; }
.ld-logo { height:60px; object-fit:contain; opacity:0; animation:fUp .8s .3s forwards; }
.ld-bar  { width:200px; height:1px; background:rgba(255,255,255,.08); overflow:hidden; opacity:0; animation:fUp .8s .6s forwards; }
.ld-fill { height:100%; background:linear-gradient(to left,#c8a45a,#e8c97a); width:0; animation:fillW 2.2s 1s ease forwards; }
.ld-txt  { font-size:.7rem; letter-spacing:5px; color:rgba(255,255,255,.28); opacity:0; animation:fUp .8s .9s forwards; }
@keyframes fUp   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
@keyframes fillW { to{width:100%} }

/* ══ LAYOUT ══ */
#stage {
  position:fixed; inset:0;
  display:flex;
  flex-direction:row;
}

/* ══ IMAGE SIDE — right 58% ══ */
#img-side {
  order:2;
  flex:0 0 58%;
  position:relative;
  background: radial-gradient(ellipse at 50% 50%, #0f1e35 0%, #070d18 100%);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}

/* canvas shimmer overlay — covers letterbox areas */
#shimmer-canvas {
  position:absolute; inset:0;
  width:100%; height:100%;
  z-index:4; pointer-events:none;
}

.simg {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:contain;
  object-position:center;
  opacity:0;
  z-index:1;
  /* clip-path reveal from center */
  clip-path:inset(50% 50% 50% 50% round 4px);
  transition:opacity 0s;
}
.simg.on {
  opacity:1;
  animation:imgReveal .9s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes imgReveal {
  0%   { clip-path:inset(8% 8% 8% 8% round 6px); opacity:0; filter:blur(12px) brightness(.6); }
  40%  { opacity:1; filter:blur(3px) brightness(.9); }
  100% { clip-path:inset(0% 0% 0% 0% round 0px); opacity:1; filter:blur(0px) brightness(1); }
}

/* ══ PANEL SIDE — left 42% ══ */
#panel-side {
  order:1;
  flex:0 0 42%;
  background:#0c1420;
  border-left:1px solid rgba(200,164,90,.12);
  display:flex;
  flex-direction:column;
  position:relative;
  z-index:10;
}

/* gold top accent */
#panel-side::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right, #c8a45a, transparent);
}

/* ══ PANEL HEADER ══ */
.ph {
  padding:32px 44px 0;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.ph img { height:54px; object-fit:contain; opacity:.92; }
.ph-num { font-size:.75rem; letter-spacing:3px; color:rgba(255,255,255,.3); }
.ph-num b { color:rgba(255,255,255,.8); font-weight:700; font-size:.9rem; }

/* ══ PANEL BODY — bigger text, fills space ══ */
.pb {
  flex:1;
  display:flex; flex-direction:column; justify-content:center;
  padding:28px 44px 20px;
  overflow:hidden;
  gap:0;
}

/* DROP-IN animation */
.pb > * { opacity:0; transform:translateY(-44px); }
.pb .p-tag   { animation:drop .5s  .05s cubic-bezier(.34,1.5,.64,1) both; }
.pb .p-ttl   { animation:drop .65s .18s cubic-bezier(.34,1.4,.64,1) both; }
.pb .p-ln    { animation:drop .45s .34s cubic-bezier(.34,1.5,.64,1) both; }
.pb .p-sub   { animation:drop .6s  .44s cubic-bezier(.34,1.3,.64,1) both; }
.pb .p-stats { animation:drop .6s  .56s cubic-bezier(.34,1.3,.64,1) both; }
.pb .p-chips { animation:drop .6s  .64s cubic-bezier(.34,1.2,.64,1) both; }

@keyframes drop {
  0%   { opacity:0; transform:translateY(-48px) scaleY(1.12); }
  65%  { opacity:1; }
  83%  { transform:translateY(4px) scaleY(.98); }
  100% { opacity:1; transform:translateY(0) scaleY(1); }
}
.pb.reset > * { opacity:0; transform:translateY(-44px); animation:none !important; }

/* TAG */
.p-tag {
  display:inline-flex; align-items:center; gap:10px;
  font-size:.75rem; letter-spacing:4px;
  color:rgba(255,255,255,.4);
  text-transform:uppercase;
  margin-bottom:18px;
}
.p-tag::before { content:''; width:18px; height:1px; background:rgba(255,255,255,.3); flex-shrink:0; }

/* TITLE */
.p-ttl {
  font-size:clamp(1.9rem, 3vw, 2.9rem);
  font-weight:900; line-height:1.22; color:#fff;
}
.p-ttl em { font-style:normal; color:#e2c278; }

/* GOLD LINE */
.p-ln {
  display:block; height:2px; width:48px;
  background:#c8a45a; margin:22px 0;
  box-shadow:0 0 10px rgba(200,164,90,.4);
}

/* SUBTITLE */
.p-sub {
  font-size:1.05rem; font-weight:300; line-height:1.95;
  color:rgba(255,255,255,.78);
  margin-bottom:0;
}

/* STATS */
.p-stats {
  display:flex; margin-top:28px;
  border-top:1px solid rgba(255,255,255,.06);
  padding-top:22px;
}
.st { flex:1; padding-left:18px; border-left:1px solid rgba(255,255,255,.07); }
.st:last-child { border-left:none; }
.st-n { display:block; font-size:2rem; font-weight:900; color:#fff; line-height:1; }
.st-l { display:block; font-size:.75rem; color:rgba(255,255,255,.38); margin-top:6px; }

/* CHIPS */
.p-chips { display:flex; flex-wrap:wrap; gap:9px; margin-top:26px; }
.ch {
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.8);
  font-size:.85rem; padding:9px 16px;
  line-height:1.4; cursor:default;
  transition:all .2s;
}
.ch:hover { background:rgba(255,255,255,.1); color:#fff; }

/* ══ PANEL FOOTER ══ */
.pf {
  padding:16px 44px 28px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
  border-top:1px solid rgba(255,255,255,.05);
}

/* DOTS */
#dots { display:flex; gap:6px; align-items:center; }
.dot {
  width:6px; height:6px; border-radius:50%;
  background:rgba(255,255,255,.2);
  cursor:pointer; transition:all .3s; pointer-events:all;
}
.dot.on { width:24px; border-radius:3px; background:#c8a45a; box-shadow:0 0 6px rgba(200,164,90,.4); }

/* NAV ARROWS */
.nav-wrap { display:flex; align-items:center; gap:6px; }

.arr {
  width:46px; height:46px;
  background:rgba(200,164,90,.14);
  border:1.5px solid rgba(200,164,90,.55);
  color:#c8a45a;
  font-size:1.4rem;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .22s;
  border-radius:3px;
  line-height:1;
}
.arr:hover  { background:rgba(200,164,90,.28); border-color:#c8a45a; color:#fff; box-shadow:0 0 14px rgba(200,164,90,.3); }
.arr:active { transform:scale(.93); }
.arr-lbl { font-size:.65rem; letter-spacing:1px; color:rgba(200,164,90,.55); text-align:center; margin-top:3px; }

/* AUTOPLAY */
#aLbl {
  font-size:.7rem; letter-spacing:2px;
  color:rgba(255,255,255,.25);
  cursor:pointer; pointer-events:all;
  transition:color .3s; user-select:none;
}
#aLbl.on { color:#c8a45a; }

/* ══ PROGRESS BAR ══ */
#prog {
  position:fixed; top:0; left:0; height:2px;
  background:linear-gradient(to left,#c8a45a,#e8c97a);
  z-index:3000;
  transition:width .7s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 10px rgba(200,164,90,.5);
}

/* ══ HERO SLIDES ══ */
body.hero-mode #img-side   { flex:0 0 100%; order:1; }
body.hero-mode #panel-side { display:none; }

.hero-ov {
  display:none;
  position:absolute; inset:0; z-index:5;
  background:linear-gradient(to top, rgba(8,12,22,.92) 0%, rgba(8,12,22,.35) 55%, rgba(8,12,22,.1) 100%);
  flex-direction:column; align-items:center; justify-content:flex-end;
  padding:0 80px 80px; text-align:center;
}
.hero-ov.show { display:flex; }

.hero-ov .p-tag  { justify-content:center; opacity:0; animation:drop .6s .1s  cubic-bezier(.34,1.5,.64,1) forwards; }
.hero-ov .p-ttl  { font-size:clamp(2.2rem,5.5vw,4.4rem); max-width:880px; opacity:0; animation:drop .75s .26s cubic-bezier(.34,1.4,.64,1) forwards; }
.hero-ov .p-ln   { margin:22px auto; opacity:0; animation:drop .5s .46s cubic-bezier(.34,1.5,.64,1) forwards; }
.hero-ov .p-sub  { max-width:660px; font-size:1.1rem; opacity:0; animation:drop .65s .58s cubic-bezier(.34,1.3,.64,1) forwards; }
.hero-ov .p-stats{ justify-content:center; margin-top:30px; max-width:720px; opacity:0; animation:drop .65s .72s cubic-bezier(.34,1.3,.64,1) forwards; }
.hero-ov .st     { text-align:center; padding:0 36px; border-left:1px solid rgba(255,255,255,.1); }
.hero-ov .st:last-child { border:none; }
.hero-ov .st-n   { font-size:2.4rem; }

.hero-logo { position:absolute; top:32px; right:48px; height:56px; object-fit:contain; opacity:.9; z-index:6; }
.hero-cnt  { position:absolute; top:40px; left:48px; font-size:.7rem; letter-spacing:3px; color:rgba(255,255,255,.3); z-index:6; }
.hero-cnt b { color:rgba(255,255,255,.7); font-size:.85rem; }

/* ══ CURTAIN ══ */
#curt { position:fixed; inset:0; z-index:400; background:#000; opacity:0; pointer-events:none; transition:opacity .2s ease; }
#curt.fl { opacity:.4; }

/* ══ RESPONSIVE ══ */
@media(max-width:900px){
  #stage { flex-direction:column; }
  #img-side   { order:1; flex:0 0 52%; width:100%; }
  #panel-side { order:2; flex:0 0 48%; width:100%; border-left:none; border-top:1px solid rgba(200,164,90,.1); }
  .ph  { padding:16px 22px 0; }
  .pb  { padding:16px 22px 12px; }
  .pf  { padding:12px 22px 18px; }
  .p-ttl { font-size:1.4rem; }
  .hero-ov { padding:0 28px 52px; }
}

/* ══ ACCESSIBILITY & POINTER FIX ══ */
@media (pointer: fine) {
  html, body { cursor: none; }
}
@media (pointer: coarse) {
  #cur, #cur2 { display: none !important; }
}

/* ══ MOBILE FIX (Hero Slides specifically under 600px) ══ */
@media(max-width: 600px){
  .hero-logo { height: 38px; top: 20px; right: 20px; }
  .hero-cnt { top: 28px; left: 20px; }
  .hero-ov { padding: 0 20px 40px; }
  .hero-ov .p-ttl { font-size: 2rem; line-height: 1.3; }
  .hero-ov .p-sub { font-size: 0.95rem; line-height: 1.6; max-width: 100%; }
  .hero-ov .p-stats { flex-direction: column; gap: 15px; margin-top: 20px; }
  .hero-ov .st { padding: 0; border-left: none; }
  .hero-ov .st-n { font-size: 1.8rem; }
}
</style>
</head>

    ttl:'التزامات <em>مالك الأرض</em>',
    sub:'أربعة التزامات جوهرية تضمن انسياب العمل وسرعة التنفيذ دون أي عوائق أو تأخير',
    chips:['🔑 تمكين المطور من دخول الموقع وإتمام الإجراءات','📝 توقيع التفويضات اللازمة لدى الجهات','🚫 عدم ترتيب أي حقوق للغير تعيق المشروع','🤝 التعاون الكامل في إجراءات إفراغ الوحدات']
  },
  {
    tag:'خطة العمل',
    ttl:'مراحل تنفيذ <em>المشروع</em>',
    sub:'مسار واضح ومنضبط من التوقيع حتى التسليم النهائي — 8 مراحل متسلسلة ومحكمة',
    chips:['① الاتفاق على الشراكة وتوقيع العقود','② استكمال الدراسات والتصاميم','③ استخراج التراخيص والموافقات النظامية','④ فتح حساب الضمان المستقل','⑤ إطلاق الحملة التسويقية والبيع','⑥ بدء أعمال التنفيذ والبناء','⑦ إدارة التحصيل وفق نسب الإنجاز','⑧ التسليم النهائي وإفراغ الوحدات']
  },
  {
    tag:'ما تكسبه',
    ttl:'القيمة المضافة <em>لمالك الأرض</em>',
    sub:'خمس مزايا استراتيجية تجعل هذه الشراكة الخيار الأمثل مقارنة بأي بديل آخر',
    chips:['📈 تعظيم قيمة الأرض مقارنة بالبيع النقدي المباشر','🛡️ الاستفادة من خبرة مطور قوي دون تحمل أعباء','🔒 حماية الحقوق عبر نظام البيع على الخارطة','🌟 شراكة في مشروع نوعي يرفع القيمة الاستثمارية','💵 عوائد إضافية في حال ارتفاع الأسعار عن المتوقع']
  },
  {
    hero:true,
    tag:'رؤيتنا',
    ttl:'نتطلع إلى<br><em>شراكة حقيقية</em>',
    sub:'تنظر الراشد العقارية لهذا المشروع باعتباره فرصة استراتيجية متميزة في موقع واعد — نحن حريصون على بناء شراكة تحقق أثراً عمرانياً واقتصادياً مستداماً',
    stats:[['شراكة','حقيقية وشفافة'],['جودة','معايير عالمية'],['أثر','مستدام']]
  }
];

/* ═══ STATE ═══ */
const TOTAL = DATA.length;
let cur=0, busy=false, autoOn=false, autoT=null;

const imgs      = [...document.querySelectorAll('.simg')];
const pb        = document.getElementById('pb');
const sNum      = document.getElementById('sNum');
const hN        = document.getElementById('hN');
const hTag      = document.getElementById('hTag');
const hTtl      = document.getElementById('hTtl');
const hSub      = document.getElementById('hSub');
const hSts      = document.getElementById('hSts');
const heroOv    = document.getElementById('heroOv');
const panelSide = document.getElementById('panel-side');
const dotsEl    = document.getElementById('dots');
const prog      = document.getElementById('prog');
const aLbl      = document.getElementById('aLbl');
const curt      = document.getElementById('curt');

/* build dots */
for(let i=0;i<TOTAL;i++){
  const d=document.createElement('div');
  d.className='dot'+(i===0?' on':'');
  d.addEventListener('click',()=>go(i));
  dotsEl.appendChild(d);
}

/* render regular panel */
function renderPanel(d){
  let h='';
  h+=`<div class="p-tag">${d.tag}</div>`;
  h+=`<div class="p-ttl">${d.ttl}</div>`;
  h+=`<div class="p-ln"></div>`;
  h+=`<div class="p-sub">${d.sub}</div>`;
  if(d.stats){
    h+='<div class="p-stats">';
    d.stats.forEach(s=>h+=`<div class="st"><span class="st-n">${s[0]}</span><span class="st-l">${s[1]}</span></div>`);
    h+='</div>';
  }
  if(d.chips){
    h+='<div class="p-chips">';
    d.chips.forEach(c=>h+=`<div class="ch">${c}</div>`);
    h+='</div>';
  }
  pb.innerHTML=h;
}

/* render hero overlay */
function renderHero(d,i){
  hTag.innerHTML=d.tag;
  hTtl.innerHTML=d.ttl;
  hSub.innerHTML=d.sub;
  hN.textContent=String(i+1).padStart(2,'0');
  hSts.innerHTML = d.stats
    ? d.stats.map(s=>`<div class="st"><span class="st-n">${s[0]}</span><span class="st-l">${s[1]}</span></div>`).join('')
    : '';
  hSts.style.display = d.stats ? 'flex' : 'none';
  /* re-trigger animations */
  [hTag,hTtl,hSub,hSts,...heroOv.querySelectorAll('.p-ln')].forEach(el=>{
    el.style.animation='none'; void el.offsetWidth; el.style.animation='';
  });
}

/* update all UI */
function updateUI(i){
  const d=DATA[i];
  prog.style.width=((i+1)/TOTAL*100)+'%';
  document.querySelectorAll('.dot').forEach((dt,j)=>dt.classList.toggle('on',j===i));

  if(d.hero){
    document.body.classList.add('hero-mode');
    heroOv.classList.add('show');
    panelSide.style.display='none';
    renderHero(d,i);
  } else {
    document.body.classList.remove('hero-mode');
    heroOv.classList.remove('show');
    panelSide.style.display='flex';
    sNum.textContent=String(i+1).padStart(2,'0');
    pb.classList.add('reset');
    renderPanel(d);
    void pb.offsetWidth;
    pb.classList.remove('reset');
  }
}

/* go to slide */
function go(next){
  if(busy||next===cur) return;
  busy=true;
  curt.style.transition='opacity .18s ease';
  curt.classList.add('fl');
  setTimeout(()=>{
    imgs[cur].classList.remove('on');
    const ni = imgs[next];
    ni.style.animation='none';
    void ni.offsetWidth;           // force reflow
    ni.style.animation='';
    ni.classList.add('on');
    cur=next;
    updateUI(cur);
    curt.style.transition='opacity .4s ease';
    curt.classList.remove('fl');
    setTimeout(()=>busy=false,440);
  },200);
}

/* navigation */
const goNext=()=>go(cur<TOTAL-1?cur+1:0);
const goPrev=()=>go(cur>0?cur-1:TOTAL-1);

document.getElementById('btnNext').addEventListener('click',goNext);
document.getElementById('btnPrev').addEventListener('click',goPrev);

/* keyboard */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')  goNext();
  if(e.key==='ArrowRight') goPrev();
  if(e.key===' '){e.preventDefault();toggleAuto();}
  if(e.key==='f'||e.key==='F') document.documentElement.requestFullscreen?.();
});

/* wheel */
let wc=false;
document.addEventListener('wheel',e=>{
  if(wc)return; wc=true;
  e.deltaY>0?goNext():goPrev();
  setTimeout(()=>wc=false,800);
},{passive:true});

/* touch swipe */
let tx=0;
document.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>55) dx>0?goPrev():goNext();
},{passive:true});

/* autoplay */
function toggleAuto(){
  autoOn=!autoOn;
  autoOn?autoT=setInterval(goNext,6000):clearInterval(autoT);
  aLbl.textContent=autoOn?'⏸ إيقاف':'▶ تلقائي';
  aLbl.classList.toggle('on',autoOn);
}
aLbl.addEventListener('click',toggleAuto);

/* cursor */
const c1=document.getElementById('cur'),c2=document.getElementById('cur2');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function loop(){
  rx+=(mx-rx)*.13; ry+=(my-ry)*.13;
  c1.style.left=mx+'px'; c1.style.top=my+'px';
  c2.style.left=rx+'px'; c2.style.top=ry+'px';
  requestAnimationFrame(loop);
})();

/* init */
updateUI(0);
setTimeout(()=>document.getElementById('loader').classList.add('out'),2600);

/* ── Canvas shimmer over letterbox areas ── */
(function(){
  const canvas = document.getElementById('shimmer-canvas');
  const ctx    = canvas.getContext('2d');
  const imgSide = document.getElementById('img-side');

  // Two independent sweep particles
  const sweeps = [
    { x:0, speed:0.0018, barTop:true,  delay:0    },
    { x:0.5, speed:0.0014, barTop:false, delay:0.5 }
  ];

  let t = 0;

  function getLetterboxHeight(){
    const sw = imgSide.offsetWidth;
    const sh = imgSide.offsetHeight;
    const img = imgs[cur];
    if(!img || !img.naturalWidth) return 0;
    const nw = img.naturalWidth;
    const nh = img.naturalHeight;
    // rendered image height with object-fit:contain
    const renderedH = Math.min(sh, sw * nh / nw);
    return Math.max(0, Math.floor((sh - renderedH) / 2));
  }

  function resize(){
    canvas.width  = imgSide.offsetWidth;
    canvas.height = imgSide.offsetHeight;
  }

  function draw(){
    const W = canvas.width;
    const H = canvas.height;
    const barH = getLetterboxHeight();
    ctx.clearRect(0, 0, W, H);

    if(barH < 4){
      requestAnimationFrame(draw);
      return;
    }

    t += 0.008;

    // ─── draw each bar (top + bottom) with background + sweep ───
    [{ y:0, h:barH }, { y:H-barH, h:barH }].forEach((bar, bi) => {

      // base fill — subtle gold gradient
      const bg = ctx.createLinearGradient(0, bar.y, 0, bar.y + bar.h);
      bg.addColorStop(0,   'rgba(200,164,90,0.03)');
      bg.addColorStop(0.5, 'rgba(200,164,90,0.10)');
      bg.addColorStop(1,   'rgba(200,164,90,0.03)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, bar.y, W, bar.h);

      // breathing glow on inner edge
      const edge = bi === 0 ? bar.y + bar.h : bar.y;
      const eg = ctx.createLinearGradient(0, edge - 6, 0, edge + 6);
      eg.addColorStop(0,   'rgba(200,164,90,0)');
      eg.addColorStop(0.5, `rgba(200,164,90,${0.15 + 0.1 * Math.sin(t * 1.2)})`);
      eg.addColorStop(1,   'rgba(200,164,90,0)');
      ctx.fillStyle = eg;
      ctx.fillRect(0, edge - 8, W, 16);

      // sweep particle
      const swOffset = bi * Math.PI;
      const phase = (t * sweeps[0].speed * 300 + swOffset) % 1;
      const cx = phase * W;
      const sw2 = W * 0.35;
      const sg = ctx.createLinearGradient(cx - sw2, 0, cx + sw2, 0);
      sg.addColorStop(0,    'rgba(232,201,122,0)');
      sg.addColorStop(0.35, 'rgba(232,201,122,0)');
      sg.addColorStop(0.5,  `rgba(232,201,122,${0.55 + 0.15 * Math.sin(t + swOffset)})`);
      sg.addColorStop(0.65, 'rgba(232,201,122,0)');
      sg.addColorStop(1,    'rgba(232,201,122,0)');
      ctx.fillStyle = sg;
      ctx.fillRect(0, bar.y, W, bar.h);

      // horizontal line at inner edge
      ctx.save();
      ctx.globalAlpha = 0.18 + 0.08 * Math.sin(t * 0.9 + swOffset);
      ctx.strokeStyle = '#c8a45a';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(0, edge);
      ctx.lineTo(W, edge);
      ctx.stroke();
      ctx.restore();
    });

    requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener('resize', ()=>{ resize(); });
  imgs.forEach(img => img.addEventListener('load', resize));
  requestAnimationFrame(draw);
})();
</script>
</body>
